# ---------------------------------------------------
# Label Sync
# ---------------------------------------------------
# Syncs GitHub labels from .github/labels.json to
# the repository. Deletes any labels not defined in
# the source file to keep things clean.
# ---------------------------------------------------

name: label-sync

on:
  push:
    branches:
      - main
    paths:
      - .github/labels.json
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.json
          delete-other-labels: true
          token: ${{ secrets.GITHUB_TOKEN }}
