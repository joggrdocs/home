<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 510">
  <defs>
    <style>
      .text { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; }
      .code { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; font-size: 12px; }
      .tab { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; font-size: 11px; fill: #cdd6f4; }
      .brand { fill: #a78bfa; }
      .dim { fill: #6c7086; }
      .st { fill: #a6e3a1; }
      .tx { fill: #cdd6f4; }
      .op { fill: #9399b2; }
      .prompt { fill: #89b4fa; }
      .warn { fill: #f9e2af; }
      .fn { fill: #89b4fa; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1120" height="510" rx="10" ry="10" fill="#1e1e2e" />
  <rect width="1120" height="36" rx="10" ry="10" fill="#181825" />
  <rect y="26" width="1120" height="10" fill="#181825" />
  <circle cx="20" cy="18" r="6" fill="#f38ba8" />
  <circle cx="40" cy="18" r="6" fill="#f9e2af" />
  <circle cx="60" cy="18" r="6" fill="#a6e3a1" />
  <text class="text dim" font-size="12" x="560" y="22" text-anchor="middle">joggr</text>

  <!-- JOGGR ASCII art (centered) -->
  <g transform="translate(560, 58)">
    <text class="text brand" font-size="13" y="0" text-anchor="middle" xml:space="preserve">     ██╗ ██████╗  ██████╗  ██████╗ ██████╗ </text>
    <text class="text brand" font-size="13" y="16" text-anchor="middle" xml:space="preserve">     ██║██╔═══██╗██╔════╝ ██╔════╝ ██╔══██╗</text>
    <text class="text brand" font-size="13" y="32" text-anchor="middle" xml:space="preserve">     ██║██║   ██║██║  ███╗██║  ███╗██████╔╝</text>
    <text class="text brand" font-size="13" y="48" text-anchor="middle" xml:space="preserve">██   ██║██║   ██║██║   ██║██║   ██║██╔══██╗</text>
    <text class="text brand" font-size="13" y="64" text-anchor="middle" xml:space="preserve">╚█████╔╝╚██████╔╝╚██████╔╝╚██████╔╝██║  ██║</text>
    <text class="text brand" font-size="13" y="80" text-anchor="middle" xml:space="preserve"> ╚════╝  ╚═════╝  ╚═════╝  ╚═════╝ ╚═╝  ╚═╝</text>
  </g>

  <!-- Subtitle -->
  <text class="text dim" font-size="12" x="560" y="160" text-anchor="middle">knowledge base built for devs and agents</text>

  <!-- Horizontal divider -->
  <line x1="16" y1="176" x2="1104" y2="176" stroke="#313244" stroke-width="1" />
  <!-- Vertical divider -->
  <line x1="560" y1="176" x2="560" y2="500" stroke="#313244" stroke-width="1" />

  <!-- Left panel: jog setup -->
  <rect x="4" y="184" width="80" height="24" rx="4" ry="4" fill="#181825" />
  <text class="tab" x="18" y="200">terminal</text>

  <text class="code" x="18" y="228"><tspan class="prompt">~</tspan><tspan class="dim"> $ </tspan><tspan class="tx">jog setup</tspan></text>
  <text class="code" x="18" y="256"><tspan class="dim">  Scanning repository...</tspan></text>
  <text class="code" x="18" y="284" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Detected claude-code, cursor</tspan></text>
  <text class="code" x="18" y="300" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Found .claude/settings.json</tspan></text>
  <text class="code" x="18" y="316" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Found CLAUDE.md</tspan></text>
  <text class="code" x="18" y="332" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Found .cursor/rules</tspan></text>
  <text class="code" x="18" y="348" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Linted 23 rules — 0 errors</tspan></text>
  <text class="code" x="18" y="364" xml:space="preserve"><tspan class="warn">  ⚠</tspan><tspan class="tx"> wildcard-permission-allow</tspan></text>
  <text class="code" x="18" y="380" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Auto-fixed 1 warning</tspan></text>
  <text class="code" x="18" y="408"><tspan class="dim">  Agent setup validated</tspan></text>
  <text class="code" x="18" y="440"><tspan class="prompt">~</tspan><tspan class="dim"> $ </tspan><tspan class="tx">&#x2588;</tspan></text>

  <!-- Right panel: Claude Code /gg -->
  <rect x="564" y="184" width="100" height="24" rx="4" ry="4" fill="#181825" />
  <text class="tab" x="578" y="200">claude code</text>

  <!-- Skill call -->
  <text class="code" x="578" y="234"><tspan class="warn">●</tspan><tspan class="tx"> Skill</tspan><tspan class="dim">(/gg:new ENG-2752)</tspan></text>

  <!-- Read ticket -->
  <text class="code" x="586" y="254"><tspan class="warn">●</tspan><tspan class="tx"> Read</tspan><tspan class="dim">(ENG-2752)</tspan></text>

  <!-- Ticket info -->
  <text class="code" x="586" y="276"><tspan class="fn">ENG-2752</tspan><tspan class="tx">: Add webhook retry logic</tspan></text>
  <text class="code" x="586" y="290"><tspan class="tx">with exponential backoff</tspan></text>

  <!-- Read codebase -->
  <text class="code" x="586" y="312"><tspan class="warn">●</tspan><tspan class="tx"> Read</tspan><tspan class="dim">(src/services/webhooks.ts)</tspan></text>
  <text class="code" x="586" y="326"><tspan class="warn">●</tspan><tspan class="tx"> Read</tspan><tspan class="dim">(docs/architecture.md)</tspan></text>

  <!-- Plan -->
  <text class="code" x="586" y="348"><tspan class="tx">Implementation plan:</tspan></text>
  <text class="code" x="586" y="364" xml:space="preserve"><tspan class="dim">  1.</tspan><tspan class="tx"> Add retry queue to webhook svc</tspan></text>
  <text class="code" x="586" y="378" xml:space="preserve"><tspan class="dim">  2.</tspan><tspan class="tx"> Implement exponential backoff</tspan></text>
  <text class="code" x="586" y="392" xml:space="preserve"><tspan class="dim">  3.</tspan><tspan class="tx"> Add dead letter handling</tspan></text>

  <text class="code" x="586" y="414"><tspan class="st">✓</tspan><tspan class="tx"> Plan saved to </tspan><tspan class="fn">.joggr/plans/ENG-2752.md</tspan></text>
  <text class="code" x="586" y="434"><tspan class="tx">Run </tspan><tspan class="brand">/clear</tspan><tspan class="tx"> then </tspan><tspan class="brand">/gg:execute</tspan><tspan class="tx"> to build.</tspan></text>

  <!-- Input (bottom) — top/bottom border lines -->
  <line x1="572" y1="450" x2="1108" y2="450" stroke="#45475a" stroke-width="1" />
  <text class="code" x="578" y="466"><tspan class="tx">&gt; &#x2588;</tspan></text>
  <line x1="572" y1="474" x2="1108" y2="474" stroke="#45475a" stroke-width="1" />

</svg>
