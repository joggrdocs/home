<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520">
  <defs>
    <style>
      .text { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; }
      .code { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; font-size: 12px; }
      .tab { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; font-size: 11px; fill: #cdd6f4; }
      .brand { fill: #a78bfa; }
      .dim { fill: #6c7086; }
      .st { fill: #a6e3a1; }
      .tx { fill: #cdd6f4; }
      .op { fill: #9399b2; }
      .prompt { fill: #89b4fa; }
      .warn { fill: #f9e2af; }
      .fn { fill: #89b4fa; }
      .peach { fill: #fab387; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1120" height="520" rx="10" ry="10" fill="#1e1e2e" />
  <rect width="1120" height="36" rx="10" ry="10" fill="#181825" />
  <rect y="26" width="1120" height="10" fill="#181825" />
  <circle cx="20" cy="18" r="6" fill="#f38ba8" />
  <circle cx="40" cy="18" r="6" fill="#f9e2af" />
  <circle cx="60" cy="18" r="6" fill="#a6e3a1" />
  <text class="text dim" font-size="12" x="560" y="22" text-anchor="middle">jog workspace</text>

  <!-- Title -->
  <text class="text brand" font-size="14" x="560" y="62" text-anchor="middle">jog workspace</text>
  <text class="text dim" font-size="12" x="560" y="80" text-anchor="middle">spin up AI-ready dev environments anywhere</text>

  <!-- Horizontal divider -->
  <line x1="16" y1="96" x2="1104" y2="96" stroke="#313244" stroke-width="1" />
  <!-- Vertical divider -->
  <line x1="560" y1="96" x2="560" y2="510" stroke="#313244" stroke-width="1" />

  <!-- Left panel: Containerized workspace -->
  <rect x="4" y="104" width="110" height="24" rx="4" ry="4" fill="#181825" />
  <text class="tab" x="14" y="120">containerized</text>

  <text class="code" x="18" y="152"><tspan class="prompt">~</tspan><tspan class="dim"> $ </tspan><tspan class="tx">jog workspace up</tspan><tspan class="brand"> --container</tspan></text>
  <text class="code" x="18" y="176"><tspan class="dim">  Resolving workspace config...</tspan></text>
  <text class="code" x="18" y="198" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Found .joggr/workspace.yml</tspan></text>
  <text class="code" x="18" y="214" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Pulled image </tspan><tspan class="fn">joggr/workspace:latest</tspan></text>

  <text class="code" x="18" y="238"><tspan class="dim">  Building container...</tspan></text>
  <text class="code" x="18" y="260" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Mounted repo at </tspan><tspan class="fn">/workspace</tspan></text>
  <text class="code" x="18" y="276" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Installed toolchain (node, pnpm)</tspan></text>
  <text class="code" x="18" y="292" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Injected agent context</tspan></text>
  <text class="code" x="18" y="308" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Applied CLAUDE.md + rules</tspan></text>

  <text class="code" x="18" y="332"><tspan class="dim">  Running setup hooks...</tspan></text>
  <text class="code" x="18" y="354" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> pnpm install </tspan><tspan class="dim">(2.1s)</tspan></text>
  <text class="code" x="18" y="370" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> db:migrate </tspan><tspan class="dim">(0.8s)</tspan></text>
  <text class="code" x="18" y="386" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> seed:dev </tspan><tspan class="dim">(1.3s)</tspan></text>

  <text class="code" x="18" y="414"><tspan class="peach">  &#x25CF;</tspan><tspan class="tx"> Container </tspan><tspan class="st">running</tspan><tspan class="dim"> (docker://jog-abc123)</tspan></text>
  <text class="code" x="18" y="434" xml:space="preserve"><tspan class="dim">    ports: </tspan><tspan class="tx">3000, 5432, 6379</tspan></text>
  <text class="code" x="18" y="454" xml:space="preserve"><tspan class="dim">    agents: </tspan><tspan class="tx">claude-code, cursor</tspan></text>

  <text class="code" x="18" y="482"><tspan class="dim">  Workspace ready </tspan><tspan class="fn">&#x2192;</tspan><tspan class="tx"> jog workspace shell</tspan></text>
  <text class="code" x="18" y="504"><tspan class="prompt">~</tspan><tspan class="dim"> $ </tspan><tspan class="tx">&#x2588;</tspan></text>

  <!-- Right panel: Remote workspace -->
  <rect x="564" y="104" width="80" height="24" rx="4" ry="4" fill="#181825" />
  <text class="tab" x="578" y="120">remote</text>

  <text class="code" x="578" y="152"><tspan class="prompt">~</tspan><tspan class="dim"> $ </tspan><tspan class="tx">jog workspace up</tspan><tspan class="brand"> --remote</tspan></text>
  <text class="code" x="578" y="176"><tspan class="dim">  Resolving workspace config...</tspan></text>
  <text class="code" x="578" y="198" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Found .joggr/workspace.yml</tspan></text>
  <text class="code" x="578" y="214" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Authenticated with Joggr Cloud</tspan></text>

  <text class="code" x="578" y="238"><tspan class="dim">  Provisioning remote instance...</tspan></text>
  <text class="code" x="578" y="260" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Region </tspan><tspan class="fn">us-east-1</tspan><tspan class="dim"> (auto-detected)</tspan></text>
  <text class="code" x="578" y="276" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Instance </tspan><tspan class="fn">dev-md</tspan><tspan class="dim"> (8 vCPU, 16 GB)</tspan></text>
  <text class="code" x="578" y="292" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Cloned repo + checked out </tspan><tspan class="fn">main</tspan></text>
  <text class="code" x="578" y="308" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Synced agent context + secrets</tspan></text>

  <text class="code" x="578" y="332"><tspan class="dim">  Running setup hooks...</tspan></text>
  <text class="code" x="578" y="354" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> pnpm install </tspan><tspan class="dim">(1.4s)</tspan></text>
  <text class="code" x="578" y="370" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> db:migrate </tspan><tspan class="dim">(0.5s)</tspan></text>
  <text class="code" x="578" y="386" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> seed:dev </tspan><tspan class="dim">(0.9s)</tspan></text>

  <text class="code" x="578" y="414"><tspan class="peach">  &#x25CF;</tspan><tspan class="tx"> Remote </tspan><tspan class="st">running</tspan><tspan class="dim"> (ssh://jog-xyz789.joggr.cloud)</tspan></text>
  <text class="code" x="578" y="434" xml:space="preserve"><tspan class="dim">    url: </tspan><tspan class="fn">https://jog-xyz789.joggr.cloud</tspan></text>
  <text class="code" x="578" y="454" xml:space="preserve"><tspan class="dim">    agents: </tspan><tspan class="tx">claude-code, cursor</tspan></text>

  <text class="code" x="578" y="482"><tspan class="dim">  Workspace ready </tspan><tspan class="fn">&#x2192;</tspan><tspan class="tx"> jog workspace ssh</tspan></text>
  <text class="code" x="578" y="504"><tspan class="prompt">~</tspan><tspan class="dim"> $ </tspan><tspan class="tx">&#x2588;</tspan></text>

</svg>