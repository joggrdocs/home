<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 368">
  <defs>
    <style>
      .text { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; }
      .code { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; font-size: 12px; }
      .tab { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; font-size: 11px; fill: #cdd6f4; }
      .brand { fill: #a78bfa; }
      .dim { fill: #6c7086; }
      .st { fill: #a6e3a1; }
      .tx { fill: #cdd6f4; }
      .op { fill: #9399b2; }
      .prompt { fill: #89b4fa; }
      .warn { fill: #f9e2af; }
      .fn { fill: #89b4fa; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="880" height="368" rx="10" ry="10" fill="#1e1e2e" />
  <rect width="880" height="36" rx="10" ry="10" fill="#181825" />
  <rect y="26" width="880" height="10" fill="#181825" />
  <circle cx="20" cy="18" r="6" fill="#f38ba8" />
  <circle cx="40" cy="18" r="6" fill="#f9e2af" />
  <circle cx="60" cy="18" r="6" fill="#a6e3a1" />
  <text class="text dim" font-size="12" x="440" y="22" text-anchor="middle">joggr</text>

  <!-- Vertical divider -->
  <line x1="440" y1="36" x2="440" y2="358" stroke="#313244" stroke-width="1" />

  <!-- Left panel: jog setup -->
  <rect x="4" y="42" width="80" height="24" rx="4" ry="4" fill="#181825" />
  <text class="tab" x="18" y="58">terminal</text>

  <text class="code" x="18" y="86"><tspan class="prompt">~</tspan><tspan class="dim"> $ </tspan><tspan class="tx">jog setup</tspan></text>
  <text class="code" x="18" y="110"><tspan class="dim">  Scanning repository...</tspan></text>
  <text class="code" x="18" y="132" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Detected claude-code, cursor</tspan></text>
  <text class="code" x="18" y="148" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Found .claude/settings.json</tspan></text>
  <text class="code" x="18" y="164" xml:space="preserve"><tspan class="warn">  ⚠</tspan><tspan class="tx"> CLAUDE.md — outdated, 3 issues</tspan></text>
  <text class="code" x="18" y="180"><tspan class="op">  ✗</tspan><tspan class="tx"> No .cursor/rules found</tspan></text>
  <text class="code" x="18" y="196"><tspan class="op">  ✗</tspan><tspan class="tx"> No rules configured</tspan></text>
  <text class="code" x="18" y="220"><tspan class="dim">  Remediating from repo profile...</tspan></text>
  <text class="code" x="18" y="242" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Updated CLAUDE.md — fixed 3 issues</tspan></text>
  <text class="code" x="18" y="258" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Generated .cursor/rules</tspan></text>
  <text class="code" x="18" y="274" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Generated 12 rules</tspan></text>
  <text class="code" x="18" y="290" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Linted — 0 errors, 0 warnings</tspan></text>
  <text class="code" x="18" y="314"><tspan class="dim">  Agent setup complete</tspan></text>
  <text class="code" x="18" y="340"><tspan class="prompt">~</tspan><tspan class="dim"> $ </tspan><tspan class="tx">&#x2588;</tspan></text>

  <!-- Right panel: Claude Code /gg -->
  <rect x="444" y="42" width="100" height="24" rx="4" ry="4" fill="#181825" />
  <text class="tab" x="458" y="58">claude code</text>

  <!-- Skill call -->
  <text class="code" x="458" y="92"><tspan class="warn">●</tspan><tspan class="tx"> Skill</tspan><tspan class="dim">(/gg:new ENG-2752)</tspan></text>

  <!-- Read ticket -->
  <text class="code" x="466" y="112"><tspan class="warn">●</tspan><tspan class="tx"> Read</tspan><tspan class="dim">(ENG-2752)</tspan></text>

  <!-- Ticket info -->
  <text class="code" x="466" y="134"><tspan class="fn">ENG-2752</tspan><tspan class="tx">: Add webhook retry logic</tspan></text>
  <text class="code" x="466" y="148"><tspan class="tx">with exponential backoff</tspan></text>

  <!-- Read codebase -->
  <text class="code" x="466" y="170"><tspan class="warn">●</tspan><tspan class="tx"> Read</tspan><tspan class="dim">(src/services/webhooks.ts)</tspan></text>
  <text class="code" x="466" y="184"><tspan class="warn">●</tspan><tspan class="tx"> Read</tspan><tspan class="dim">(docs/architecture.md)</tspan></text>

  <!-- Plan -->
  <text class="code" x="466" y="206"><tspan class="tx">Implementation plan:</tspan></text>
  <text class="code" x="466" y="222" xml:space="preserve"><tspan class="dim">  1.</tspan><tspan class="tx"> Add retry queue to webhook svc</tspan></text>
  <text class="code" x="466" y="236" xml:space="preserve"><tspan class="dim">  2.</tspan><tspan class="tx"> Implement exponential backoff</tspan></text>
  <text class="code" x="466" y="250" xml:space="preserve"><tspan class="dim">  3.</tspan><tspan class="tx"> Add dead letter handling</tspan></text>

  <text class="code" x="466" y="272"><tspan class="st">✓</tspan><tspan class="tx"> Plan saved to </tspan><tspan class="fn">.joggr/plans/ENG-2752.md</tspan></text>
  <text class="code" x="466" y="292"><tspan class="tx">Run </tspan><tspan class="brand">/clear</tspan><tspan class="tx"> then </tspan><tspan class="brand">/gg:execute</tspan><tspan class="tx"> to build.</tspan></text>

  <!-- Input (bottom) — top/bottom border lines -->
  <line x1="452" y1="308" x2="868" y2="308" stroke="#45475a" stroke-width="1" />
  <text class="code" x="458" y="324"><tspan class="tx">&gt; &#x2588;</tspan></text>
  <line x1="452" y1="332" x2="868" y2="332" stroke="#45475a" stroke-width="1" />

</svg>
